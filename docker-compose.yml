version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travel-rag-api
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=False
      - RELOAD=False
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - CHUNK_SIZE=100
      - CHUNK_OVERLAP=20
      - TOP_K_RESULTS=5
    volumes:
      - ./data:/app/data
      - ./api:/app/api
      - ./src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - travel-rag-network
    depends_on:
      - data-init

  data-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travel-rag-data-init
    environment:
      - DEBUG=False
    volumes:
      - ./data:/app/data
      - ./notebook:/app/notebook
    command: >
      bash -c "echo 'Data directory ready at /app/data'"
    networks:
      - travel-rag-network

networks:
  travel-rag-network:
    driver: bridge

volumes:
  data:
    driver: local
