version: '3.8'

# Override configuration for development
# Copy to docker-compose.override.yml to use

services:
  api:
    environment:
      - DEBUG=True
      - RELOAD=True
      - LOG_LEVEL=debug
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ./src:/app/src
      - ./data:/app/data
